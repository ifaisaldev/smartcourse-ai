{% extends "base.html" %}

{% block content %}
<ul class="nav nav-tabs mb-4" id="dashboardTabs" role="tablist">
    <li class="nav-item" role="presentation">
        <button class="nav-link active" id="history-tab" data-bs-toggle="tab" data-bs-target="#history" type="button"
            role="tab">Search History</button>
    </li>
    <li class="nav-item" role="presentation">
        <button class="nav-link" id="saved-tab" data-bs-toggle="tab" data-bs-target="#saved" type="button"
            role="tab">Saved Courses</button>
    </li>
</ul>

<div class="tab-content" id="dashboardTabContent">
    <div class="tab-pane fade show active" id="history" role="tabpanel">
        <div class="list-group" id="historyList">
            <!-- History items will be loaded here -->
            <div class="text-center py-4">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>
    </div>
    <div class="tab-pane fade" id="saved" role="tabpanel">
        <div class="row" id="savedList">
            <!-- Saved items will be loaded here -->
            <div class="text-center py-4">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
